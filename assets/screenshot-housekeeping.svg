  <text x="450" y="22" fill="#9ca3af" font-size="13" text-anchor="middle">GoTell.exe — Menu Housekeeping</text>

  <text x="40" y="70" fill="#38bdf8" font-size="16">  MENU HOUSEKEEPING - Nurra</text>
  <line x1="40" y1="82" x2="860" y2="82" stroke="#374151" stroke-width="1"/>

  <g font-size="14" fill="#e5e7eb">
